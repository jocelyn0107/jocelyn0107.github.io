<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../img/favicon.svg" type="image/x-icon">
  <link rel="stylesheet" href="../../../SETTING/common/css/reset.css">
  <link rel="stylesheet" href="../../../SETTING/common/css/common.css">
  <link rel="stylesheet" href="../css/font.css">
  <link rel="stylesheet" href="../css/ui.css">
  <title>축제스탬프투어 관리자</title>
</head>
<body>
  <h1 class="ir_su">축제스탬프투어 공무원 관리자</h1>
  <div class="index_bg login_bg"></div>
  <div class="login_wrap">
    <!-- logo -->
    <div class="login_logo">
      <img src="../img/logo.svg" alt="logo">
    </div>
    <!-- s: login_form -->
    <div class="login_form">
      <div class="form_group">
        <label for="userEmail">이메일</label>
        <input type="password" class="input_form mb_4" id="userEmail" placeholder="이메일">
      </div>
      <div class="form_group">
        <label for="userPw">비밀번호</label>
        <input type="password" class="input_form wrong" id="userPw" placeholder="비밀번호" autocomplete="off" maxlength="20">
      </div>
      <label class="checkbox mt_3 mb_5">
        <input type="checkbox" checked="">
        <div class="label">비밀번호 저장</div>
        <div class="validation">이메일과 비밀번호를 다시 확인해주세요.</div>
      </label>
      <!-- btn_login -->
      <div class="btn_hover">
        <button class="bnt_goto_login" onclick="location.href='dashboard.html'">
          <div><span>로</span><span>그</span><span>인</span></div>
        </button>
      </div>
    </div>
    <!-- e: login_form -->
  </div>
</body>
</html>
